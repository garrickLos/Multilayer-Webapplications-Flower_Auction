<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inloggen – Royal FloraHolland</title>
    <link rel="stylesheet" href="/front-end/webpagina's/css/registration.css" />
    <link rel="stylesheet" href="/front-end/webpagina's/css/homePageStylesheet.css">
    <link rel="stylesheet" href="/front-end/webpagina's/css/header_footer.css">
</head>
<body>

<header>
    <div class="HoofschermContainer">
        <div class="logoTitel">
            <img src="/front-end/resources/pictures/webp/floraHolidayLogo.webp" alt="Royal Flora Holland logo" class="floraLogo">
            <h1>Flora Royal Holland</h1>
        </div>

        <nav>
            <ul>
                <div class="veilingPLaatsen">
                    <img src="/front-end/resources/pictures/webp/Contact2.webp" alt="Contact" class="ContactPersoonLogo">
                    <li>Service en contact</li>
                </div>
                <div class="klantGegevens">
                    <img src="/front-end/resources/pictures/webp/Home.webp" alt="home" class="HomeButtonLogo">
                    <li class="homeknop">Home</li>
                </div>
            </ul>
        </nav>
    </div>
</header>

<main class="hero">
    <div class="container hero-grid">
        <div class="hero-left">
            <h1>Inloggen</h1>

            <form class="form" action="#" method="post" novalidate>

                <label class="visually-hidden" for="email">E-mailadres</label>
                <input id="email" name="email" type="email" placeholder="Emailadres" inputmode="email" required autocomplete="username">

                <label class="visually-hidden" for="wachtwoord">Wachtwoord</label>
                <input id="wachtwoord" name="wachtwoord" type="password" placeholder="Wachtwoord" required autocomplete="current-password">

                <div class="consent-row" style="justify-content: space-between; align-items: center;">
                    <label class="checkbox">
                        <input type="checkbox" name="remember" />
                        <span>Onthoud mij</span>
                    </label>

                    <a href="#" class="subtle-label" id="forgotLink">Wachtwoord vergeten?</a>
                </div>

                <button type="submit" class="btn-primary">Inloggen</button>

                <p class="login-hint">
                    Nog geen account?
                    <a id="loginTekst" href="../html/registration.html">Registreer hier</a>
                </p>
            </form>
        </div>
    </div>
</main>

<footer>
    <div class="overlayBlock">
        <div class="footerText">
            <div class="footer-image">
                <img src="/front-end/resources/pictures/ico/Screenshot_2025-10-27_114430-removebg-preview.ico" alt="">
            </div>
            <div class="text-column_one">
                <p>Intranet Royal FloraHolland</p>
            </div>
            <div class="text-column_two">
            </div>
        </div>
    </div>
</footer>
<script src="../javascript/Login.js"></script>
<script src="../javascript/headers.js"></script>
<script>headerItems(".logoTitel", "../html/homeScreen.html")</script>
<script>headerItems(".homeknop", "../html/homeScreen.html")</script>

</body>
</html>
