<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flora Holiday</title>
</head>
<style>
    body {
        margin: 0;
    }
    .HoofschermContainer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
    }
    .logoTitel, .mijnVeilingenBekijken, .klantGegevens{
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .floraLogo, .mijnVeilingenBekijkenLogo, .klantGegevensLogo {
        width: 50px;
        height: auto;
        display: block;
        border: 1px solid white;
        outline: 1px solid white;
    }
    h1 {
        font-size: 18px;
        color: green;
        margin: 0;
    }
    nav ul {
        list-style: none;
        display: flex;
        gap: 20px;
        margin: 0;
        padding: 0;
        color: green;
    }

    nav li {
        cursor: pointer;
    }
    .kopje{
        display: inline-flex;
    }
    .titelTekst {
        color: saddlebrown;
        font-size: 20px;
    }

    .kopje, nav ul{
        list-style: none;
        display: flex;
        gap: 20px;
        margin: 0;
        padding: 0;
        justify-content: space-between;
    }
    .productenPerDatum, .nieuweProductToevoegen, .winst{
        background-color: blue;
        color: white;
    }
    .rij{
        display: flex;
        justify-content: flex-start;
        align-items: flex-start;
        gap: 15px;
        max-width: 1200px;
        margin: 0 auto;
        padding-left: 10px;
        padding-right: 10px;
    }
    .kolomLinks{
        flex: 1;
    }
    .kolomRechts{
        outline: 1px solid saddlebrown;
        outline-offset: 0;
        width: 60%;
        padding-right: 30px;
        display: flex;
        flex-direction: column;
    }
    .fotoProduct{
        width: 30%;
        height: auto;
    }
    .linkerHelft, .rechterHelft{
        display: flex;
        justify-content: space-between;
    }
    .winst{
        align-self: flex-end;
    }
    .productNaam, .productCategorie, .hoeveelheid, .plaats{
        outline: 1px solid lightgray;
        outline-offset: 0;
    }
    .footer{
        background-image: url("/resources/pictures/webp/footer.webp");
        height: 150px;
        width: 100%;
        background-size: cover;
        background-position: center;
        position: fixed;
        justify-content: center;
        align-items: center;
        bottom: 0;
        display: flex;
    }
    .overOns{
        color: white;

    }
</style>
</head>
<body>
<div class="HoofschermContainer">
    <div class="logoTitel">
        <img src="/resources/pictures/webp/floraHolidayLogo.webp" alt="Royal Flora Holland logo" class="floraLogo">
        <h1>Flora Royal Holland</h1>
    </div>

    <nav>
        <ul>
            <div class="mijnVeilingenBekijken">
                <img src="resources/pictures/webp/mijnVeilingenBekijken.webp" alt="foto van een blad" class="mijnVeilingenBekijkenLogo">
                <li>Mijn veilingen bekijken</li>
            </div>
            <div class="klantGegevens">
                <img src="/resources/pictures/webp/klantGegevens.webp" alt="foto van een persoon" class="klantGegevensLogo">
                <li>Gegevens</li>
            </div>
        </ul>
    </nav>
</div>
</body>
<body>
<div class="kopje">
    <div class="titelTekst">My listed products</div>
    <nav>
        <ul>
            <button class="productenPerDatum">View products by date</button>
            <button class="nieuweProductToevoegen">Add new product</button>
        </ul>
    </nav>
</div>
</body>
<main>
    <div class="rij">
        <div class="kolomLinks">
            <img src="/resources/pictures/webp/download.webp" alt="daBaby" class="fotoProduct">
        </div>
        <div class="kolomRechts">
            <div class="linkerHelft">
                <div class="productNaam">Product name:</div>
                <div class="productCategorie">Product category:</div>
            </div>
            <div class="rechterHelft">
                <div class="hoeveelheid">Amount:</div>
                <div class="plaats">Place:</div>
            </div>
            <button class="winst">Show revenue</button>
        </div>
    </div>
    <div class="rij">
        <div class="kolomLinks">
            <img src="/resources/pictures/webp/download.webp" alt="daBaby" class="fotoProduct">
        </div>
        <div class="kolomRechts">
            <div class="linkerHelft">
                <div class="productNaam">Product name:</div>
                <div class="productCategorie">Product category:</div>
            </div>
            <div class="rechterHelft">
                <div class="hoeveelheid">Amount:</div>
                <div class="plaats">Place:</div>
            </div>
            <button class="winst">Show revenue</button>
        </div>
    </div>
    <div class="rij">
        <div class="kolomLinks">
            <img src="/resources/pictures/webp/download.webp" alt="daBaby" class="fotoProduct">
        </div>
        <div class="kolomRechts">
            <div class="linkerHelft">
                <div class="productNaam">Product name:</div>
                <div class="productCategorie">Product category:</div>
            </div>
            <div class="rechterHelft">
                <div class="hoeveelheid">Amount:</div>
                <div class="plaats">Place:</div>
            </div>
            <button class="winst">Show revenue</button>
        </div>
    </div>
</main>
<footer class="footer">
    <li class="overOns">Over ons</li>
</footer>
</html>
