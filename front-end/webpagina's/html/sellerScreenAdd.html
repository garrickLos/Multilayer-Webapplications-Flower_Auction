<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flora Holiday</title>
    <!-- Hier wordt de grotte en kleur aangepast -->
    <style>
        body {
            margin: 0;
        }
        .HoofschermContainer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
        }
        .logoTitel, .veilingPLaatsen, .mijnVeilingenBekijken, .klantGegevens{
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .floraLogo, .veilingPlaatsenLogo, .mijnVeilingenBekijkenLogo, .klantGegevensLogo {
            width: 50px;
            height: auto;
            display: block;
            border: 1px solid white;
            outline: 1px solid white;
        }
        h1 {
            font-size: 18px;
            color: green;
            margin: 0;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
            color: green;
        }

        nav li {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="HoofschermContainer">
    <div class="logoTitel">
        <img src="/resources/pictures/webp/floraHolidayLogo.webp" alt="Royal Flora Holland logo" class="floraLogo">
        <h1>Flora Royal Holland</h1>
    </div>

    <nav>
        <ul>
            <div class="veilingPLaatsen">
                <img src="/resources/pictures/webp/veilingPlaatsen.webp" alt="houten hamer (gavel)" class="veilingPlaatsenLogo">
                <li>Veiling plaatsen</li>
            </div>
            <div class="mijnVeilingenBekijken">
                <img src="/resources/pictures/webp/mijnVeilingenBekijken.webp" alt="foto van een blad" class="mijnVeilingenBekijkenLogo">
                <li>Mijn veilingen bekijken</li>
            </div>
            <div class="klantGegevens">
                <img src="/resources/pictures/webp/klantGegevens.webp" alt="foto van een persoon" class="klantGegevensLogo">
                <li>Gegevens</li>
            </div>
        </ul>
    </nav>
</div>
</body>
<header>
    <main>
        <section>
            <style>
                h2{
                    font-size: 20px;
                    color: saddlebrown;
                }
            </style>
            <h2>Artificial Citroen boom in deco pot</h2>
        </section>
        <section>
            <style>
                h2{
                    font-size: 12px;
                    color: saddlebrown;
                }
                h3{
                    display: inline-block;
                    background-color: saddlebrown;
                    font-size: 12px;
                    color: white;
                }
                h2, h3{
                    display: inline-block;
                }
            </style>
            <h2>Actn:</h2>
            <h3>A3-36638-132</h3>
        </section>
        <style>
            .Container {
                display: flex;
                gap: 35px;
                align-items: stretch;
                max-width: 1200px;
                margin: 0 auto;
                padding-left: 10px;
                padding-right: 10px;
            }

            .Container section {
                flex: 1;
                box-sizing: border-box;
            }

            .scherm2Container, .scherm3Container {
                outline: 1px solid saddlebrown;
                outline-offset: 15px;
                padding: 10px;
                margin-top: 15px;
            }

            .fotoContainer {
                max-width: 250px;
                margin: 0 auto;
            }

            .grote-foto {
                width: 100%;
                border: 1px solid saddlebrown;
            }

            .kleine-fotos {
                display: flex;
                justify-content: flex-start;
                gap: 15px;
            }

            .kleine-foto {
                width: calc((100% / 3) - 11px);
                height: auto;
                display: block;
                border: 1px solid saddlebrown;
            }

            .ordenen {
                display: flex;
                justify-content: flex-start;
                border: 1px solid lightgray;
                margin-bottom: 5px;
            }

            label, input {
                display: block;
            }

            input {
                border: none;
            }

            .kopje {
                font-size: 12px;
                color: saddlebrown;
            }

            .name, .category, .amount, .place, .minimumPrice {
                font-size: 8px;
                color: black;
            }
            .scherm3Container input{
                border: 1px solid lightgray;
            }

            .scherm3Ordenen {
                display: block;
            }

            .placeProduct {
                color: white;
                background-color: blue;
                display: block;
                margin: 10px auto 0 auto;
                padding: 5px 50px;
            }
        </style>
        </head>
        <body>
        <div class="Container">
            <section class="schermDeel1">
                <div class="fotoContainer">
                    <img src="/resources/pictures/webp/download.webp" alt="dababy" class="grote-foto">
                    <div class="kleine-fotos">
                        <img src="/resources/pictures/webp/download.webp" alt="dababy" class="kleine-foto">
                        <img src="/resources/pictures/webp/download.webp" alt="dababy" class="kleine-foto">
                        <img src="/resources/pictures/webp/download.webp" alt="dababy" class="kleine-foto">
                    </div>
                </div>
            </section>

            <section class="schermDeel2">
                <div class="scherm2Container">
                    <div class="kopje">Product Details</div>
                    <div class="ordenen">
                        <label for="username" class="name">Product name:</label>
                        <input type="text" id="username" name="username"/>
                    </div>
                    <div class="ordenen">
                        <label for="productcategory" class="category">Product category:</label>
                        <input type="text" id="productcategory" name="productcategory"/>
                    </div>
                    <div class="ordenen">
                        <label for="productamount" class="amount">Amount:</label>
                        <input type="number" id="productamount" name="productamount"/>
                    </div>
                    <div class="ordenen">
                        <label for="productplace" class="place">Place:</label>
                        <input type="text" id="productplace" name="productplace"/>
                    </div>
                    <div class="ordenen">
                        <label for="minimumPriceProduct" class="minimumPrice">Minimum Price:</label>
                        <input type="number" id="minimumPriceProduct" name="minimumPriceProduct"/>
                    </div>
                </div>
            </section>

            <section class="schermDeel3">
                <div class="scherm3Container">
                    <div class="scherm3Ordenen">
                        <label for="startPrice" class="price">Start price:</label>
                        <input type="number" id="startPrice" name="startPrice"/>
                    </div>
                    <div class="scherm3Ordenen">
                        <label for="startDate" class="sDate">Start date:</label>
                        <input type="date" id="startDate" name="startDate"/>
                    </div>
                    <div class="scherm3Ordenen">
                        <label for="endDate" class="eDate">End date:</label>
                        <input type="date" id="endDate" name="endDate"/>
                    </div>
                    <button class="placeProduct">Place Product</button>
                </div>
            </section>
        </div>
        </body>
    </main>
    <style>
        .footer{
            background-image: url("/resources/pictures/webp/footer.webp");
            height: 150px;
            width: 100%;
            background-size: cover;
            background-position: center;
            position: fixed;
            justify-content: center;
            align-items: center;
            bottom: 0;
            display: flex;
        }
        .overOns{
            color: white;

        }
    </style>
    <footer class="footer">
        <li class="overOns">Over ons</li>
    </footer>
</header>
</html>
